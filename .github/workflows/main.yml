name: Build

on: workflow_dispatch

jobs:
  get-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: tag
        run: |
          tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$tag" >> $GITHUB_OUTPUT

  build:
    needs: get-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            artifact: linux-amd64
          - os: windows-latest
            platform: windows/amd64
            artifact: windows-amd64
          - os: macos-latest
            platform: darwin/universal
            artifact: darwin-universal
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # Ubuntu 20.04/22.04 → libwebkit2gtk-4.0, Ubuntu 24.04 → libwebkit2gtk-4.1
      # DISTRO is exported so the build step can add -tags webkit2_41 on 24.04
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          export DEBIAN_FRONTEND=noninteractive
          until sudo apt-get -yq update; do sleep 2; done
          DISTRO=$(lsb_release -rs)
          if [[ "$DISTRO" == "24.04" ]]; then
            sudo apt-get -yq install libgtk-3-0 libwebkit2gtk-4.1-dev gcc-aarch64-linux-gnu
          else
            sudo apt-get -yq install libgtk-3-0 libwebkit2gtk-4.0-dev gcc-aarch64-linux-gnu
          fi
          echo "DISTRO=$DISTRO" >> $GITHUB_ENV

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true
          cache: true
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          check-latest: true

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        shell: bash
        run: |
          if [ -f "frontend/package.json" ]; then
            cd frontend && npm ci
          elif [ -f "package.json" ]; then
            npm ci
          fi

      # -nsis produces a Windows installer alongside the .exe
      # Ubuntu 24.04 needs -tags webkit2_41 for the newer WebKit ABI
      - name: Build
        shell: bash
        run: |
          OPTS=""
          [[ "${{ matrix.platform }}" == "windows/amd64" ]] && OPTS="$OPTS -nsis -webview2 download"
          [[ "${DISTRO:-}" == "24.04" ]] && OPTS="$OPTS -tags webkit2_41"
          wails build --platform ${{ matrix.platform }} -o postier $OPTS

      - name: Set executable permissions
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ "${{ runner.os }}" == "macOS" ]; then
            chmod +x build/bin/*/Contents/MacOS/*
          else
            chmod +x build/bin/postier
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: postier-${{ matrix.artifact }}-${{ needs.get-tag.outputs.tag }}
          path: build/bin/

      # Linux only: build .deb, .rpm and .apk via nFPM
      # nfpm.yaml expects the binary at build/bin/postier — wails puts it there via -o postier

      - name: Install nFPM
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/goreleaser/nfpm/releases/download/v2.40.0/nfpm_2.40.0_Linux_x86_64.tar.gz
          tar -xzf nfpm_2.40.0_Linux_x86_64.tar.gz
          sudo mv nfpm /usr/local/bin/

      - name: Build Linux packages
        if: runner.os == 'Linux'
        run: |
          POSTIER_VERSION=${{ needs.get-tag.outputs.tag }} nfpm package --packager deb --target ./build/
          POSTIER_VERSION=${{ needs.get-tag.outputs.tag }} nfpm package --packager rpm --target ./build/
          POSTIER_VERSION=${{ needs.get-tag.outputs.tag }} nfpm package --packager apk --target ./build/

      - name: Upload Linux packages
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: postier-linux-packages-${{ needs.get-tag.outputs.tag }}
          path: |
            build/*.deb
            build/*.rpm
            build/*.apk
