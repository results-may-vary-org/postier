name: Build app for linux, windows and mac

on: workflow_dispatch

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  get-tag:
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.get_tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$tag" >> $GITHUB_OUTPUT

  build:
    needs: get-tag
    strategy:
      fail-fast: false
      matrix:
        build:
          - name: 'postier'
            platform: 'linux/amd64'
            platform_hyphen: 'linux-amd64'
            os: 'ubuntu-22.04'
            build_tags: ''
            webkit_dep: 'libwebkit2gtk-4.0-37'
          - name: 'postier'
            platform: 'linux/amd64'
            platform_hyphen: 'linux-amd64-webkit2_41'
            os: 'ubuntu-24.04'
            build_tags: 'webkit2_41'
            webkit_dep: 'libwebkit2gtk-4.1-0'
          - name: 'postier'
            platform: 'windows/amd64'
            platform_hyphen: 'windows-amd64'
            os: 'windows-latest'
            build_tags: ''
            webkit_dep: ''
          - name: 'postier'
            platform: 'darwin/universal'
            platform_hyphen: 'darwin-universal'
            os: 'macos-latest'
            build_tags: ''
            webkit_dep: ''

    runs-on: ${{ matrix.build.os }}
    env:
      POSTIER_VERSION: ${{ needs.get-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.23'
          cache: true

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # darwin uses just the name so wails produces postier.app — needed for DMG creation
      # other platforms embed platform + tag in the name for versioned artifact filenames
      - name: Build wails
        uses: dAppServer/wails-build-action@main
        id: build
        with:
          build-cache: false
          build-name: ${{ matrix.build.platform == 'darwin/universal' && matrix.build.name || format('{0}-{1}-{2}', matrix.build.name, matrix.build.platform_hyphen, needs.get-tag.outputs.tag) }}
          build-platform: ${{ matrix.build.platform }}
          package: true
          nsis: ${{ matrix.build.platform == 'windows/amd64' }}
          go-version: '1.23'
          wails-version: 'v2.10.2'
          build-tags: ${{ matrix.build.build_tags }}

      # Wrap the .app in a DMG for distribution — no code signing required
      - name: Create DMG (macOS)
        if: matrix.build.platform == 'darwin/universal'
        run: |
          hdiutil create \
            -volname "Postier" \
            -srcfolder "build/bin/postier.app" \
            -ov -format UDZO \
            "build/bin/postier-darwin-universal-${{ needs.get-tag.outputs.tag }}.dmg"

      - name: Upload DMG (macOS)
        if: matrix.build.platform == 'darwin/universal'
        uses: actions/upload-artifact@v4
        with:
          name: postier-darwin-universal-${{ needs.get-tag.outputs.tag }}
          path: build/bin/postier-darwin-universal-${{ needs.get-tag.outputs.tag }}.dmg

      - name: Setup nFPM
        if: matrix.build.platform == 'linux/amd64'
        run: |
          wget https://github.com/goreleaser/nfpm/releases/download/v2.40.0/nfpm_2.40.0_Linux_x86_64.tar.gz
          tar -xzf nfpm_2.40.0_Linux_x86_64.tar.gz
          sudo mv nfpm /usr/local/bin/
          nfpm --version

      - name: Create Linux packages
        if: matrix.build.platform == 'linux/amd64'
        run: |
          ls -la build/bin/

          # The action names the binary postier-{platform_hyphen}-{tag}; nfpm.yaml expects build/bin/postier
          cp build/bin/postier-${{ matrix.build.platform_hyphen }}-${{ needs.get-tag.outputs.tag }} build/bin/postier
          chmod +x build/bin/postier

          if [ ! -f build/appicon.png ]; then
            echo "Warning: appicon.png not found in build/"
          fi

          # Patch the webkit dependency for the webkit2_41 build (Arch, Ubuntu 24.04, etc.)
          if [ -n "${{ matrix.build.webkit_dep }}" ]; then
            sed -i 's/libwebkit2gtk-4\.[0-9]-[0-9]*/'"${{ matrix.build.webkit_dep }}"'/g' nfpm.yaml
          fi

          POSTIER_VERSION=${{ needs.get-tag.outputs.tag }} nfpm package --packager deb --target ./build/
          POSTIER_VERSION=${{ needs.get-tag.outputs.tag }} nfpm package --packager rpm --target ./build/
          POSTIER_VERSION=${{ needs.get-tag.outputs.tag }} nfpm package --packager apk --target ./build/

          ls -la build/*.{deb,rpm,apk} || echo "Some packages may not have been generated"

      - name: Build nsis
        if: matrix.build.os == 'ubuntu-22.04'
        run: |
          sudo apt install nsis libwebkit2gtk-4.0-dev
          wails build -nsis -platform "windows"
          cp build/bin/postier.exe build/bin/postier-windows-${{ needs.get-tag.outputs.tag }}.exe

      - name: Upload Linux packages
        if: matrix.build.platform == 'linux/amd64'
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ matrix.build.platform_hyphen }}-${{ needs.get-tag.outputs.tag }}
          path: |
            build/*.deb
            build/*.rpm
            build/*.apk

      - name: Upload NSIS packages
        if: matrix.build.os == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: nsis-packages-${{ needs.get-tag.outputs.tag }}
          path: |
            build/bin/*.exe
