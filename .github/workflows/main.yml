name: Wails v2 build (matrix)

# Triggered manually from the Actions tab
on: workflow_dispatch

jobs:
  # Resolve the latest git tag so it can be shared across all matrix jobs.
  # Falls back to v0.0.0 when no tag exists yet.
  get-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required for git describe
      - name: Get latest tag
        id: get_tag
        run: |
          tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$tag" >> $GITHUB_OUTPUT

  build:
    needs: get-tag
    strategy:
      fail-fast: false # let all platforms finish even if one fails
      matrix:
        build: [
          {name: postier, platform: linux/amd64,     os: ubuntu-latest,  nsis: 'false'},
          {name: postier, platform: windows/amd64,   os: windows-latest, nsis: 'true'},
          {name: postier, platform: darwin/universal, os: macos-latest,   nsis: 'false'}
        ]
    runs-on: ${{ matrix.build.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Use the wails2 sub-action directly — it accepts nsis/build-obfuscate as proper inputs
      # and avoids the path resolution issue of the root snider/build@v3 action.
      # Note: wails v2.10.0 is reportedly broken; pin to v2.9.0 if builds fail on latest.
      # build-name "postier" → wails runs with -o postier → binary at build/bin/postier.
      - uses: host-uk/build@v4
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}
          nsis: ${{ matrix.build.nsis }}
          package: 'true'

      # --- Linux-only: generate .deb / .rpm / .apk packages via nFPM ---
      # nfpm.yaml describes package metadata and expects the binary at build/bin/postier,
      # which is exactly where the build step above places it.
      # POSTIER_VERSION is injected so packages carry the correct version string.

      - name: Setup nFPM (Linux only)
        if: matrix.build.os == 'ubuntu-latest'
        run: |
          wget https://github.com/goreleaser/nfpm/releases/download/v2.40.0/nfpm_2.40.0_Linux_x86_64.tar.gz
          tar -xzf nfpm_2.40.0_Linux_x86_64.tar.gz
          sudo mv nfpm /usr/local/bin/
          nfpm --version

      - name: Create Linux packages (Linux only)
        if: matrix.build.os == 'ubuntu-latest'
        run: |
          chmod +x build/bin/postier

          POSTIER_VERSION=${{ needs.get-tag.outputs.tag }} nfpm package --packager deb --target ./build/
          POSTIER_VERSION=${{ needs.get-tag.outputs.tag }} nfpm package --packager rpm --target ./build/
          POSTIER_VERSION=${{ needs.get-tag.outputs.tag }} nfpm package --packager apk --target ./build/

          ls -la build/*.deb build/*.rpm build/*.apk || echo "Some packages may not have been generated"

      - name: Upload Linux packages (Linux only)
        if: matrix.build.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages-${{ needs.get-tag.outputs.tag }}
          path: |
            build/*.deb
            build/*.rpm
            build/*.apk
